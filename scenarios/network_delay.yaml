# 应急演练场景配置 - 网络延迟场景
# 模拟网络延迟，验证系统在网络不稳定情况下的表现

scenario:
  name: "网络延迟演练"
  description: "模拟网络延迟，验证系统在网络不稳定情况下的自愈能力和监控告警"
  type: "network_delay"
  engine: "chaos_mesh"

# 目标资源
target:
  namespace: "default"
  # Pod 名称（运行时需要替换为实际的 Pod 名称）
  pod_name: "nginx-demo-xxxx-xxxx"
  # 或者使用标签选择器（未来版本支持）
  # label_selector: "app=nginx"

# 故障配置
fault:
  # 网络延迟配置
  network:
    # 延迟时间（如 100ms, 1s, 2s）
    latency: "100ms"
    # 抖动时间（延迟的随机波动范围）
    jitter: "10ms"
    # 影响方向（to: 出站, from: 入站, both: 双向）
    direction: "to"
  
  # 故障持续时间
  duration: "60s"

# 预期结果
expected:
  # 期望的告警名称
  alert_name: "HighNetworkLatency"
  # 告警应在多少秒内触发
  alert_timeout: 180
  # 网络延迟阈值（超过此值触发告警）
  latency_threshold: "100ms"

# 验证项
validation:
  # 是否验证监控告警
  check_alert: true
  # 是否验证网络连通性
  check_connectivity: true
  # 是否生成报告
  generate_report: true

# Prometheus 配置（用于告警验证）
prometheus:
  url: "http://localhost:9090"
  # 如果需要认证，配置以下参数
  # username: "admin"
  # password: "password"

# 报告配置
report:
  # 报告输出路径
  output_dir: "./reports"
  # 报告格式（markdown, pdf）
  format: "markdown"
  # 是否包含 Grafana 截图
  include_screenshot: false
  # 是否包含网络指标
  include_metrics: true

# 恢复配置
recovery:
  # 故障结束后是否自动清理
  auto_cleanup: true
  # 清理超时时间（秒）
  cleanup_timeout: 60
