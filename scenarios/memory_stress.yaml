# 应急演练场景配置 - 内存压力测试场景
# 模拟应用内存资源耗尽，验证系统在内存压力下的表现

# 内存压力测试场景是 CPU 压测场景的变体，# 专注于内存资源的消耗

scenario:
  name: "内存压力测试演练"
  description: "模拟应用内存资源耗尽，验证系统在内存压力下的自愈能力和监控告警"
  type: "memory_stress"
  engine: "chaos_mesh"

# 目标资源
target:
  namespace: "default"
  # Pod 名称（运行时需要替换为实际的 Pod 名称）
  pod_name: "nginx-demo-xxxx-xxxx"
  # 或者使用标签选择器（未来版本支持）
  # label_selector: "app=nginx"

# 故障配置
fault:
  # 内存压测配置
  memory:
    # 压测内存大小（Chaos Mesh 使用字节数，不带单位）
    # 示例：100Mi = 104857600, 256Mi = 268435456, 512Mi = 536870912
    # 1Gi = 1073741824
    size: "268435456"
    # 压测 workers 数量
    workers: 1
  
  # 故障持续时间
  duration: "60s"

# 预期结果
expected:
  # 期望的告警名称
  alert_name: "HighMemoryUsage"
  # 告警应在多少秒内触发
  alert_timeout: 180
  # 内存使用率阈值（超过此值触发告警）
  memory_threshold: 80

# 验证项
validation:
  # 是否验证监控告警
  check_alert: true
  # 是否生成报告
  generate_report: true

# Prometheus 配置（用于告警验证）
prometheus:
  url: "http://localhost:9090"
  # 如果需要认证，配置以下参数
  # username: "admin"
  # password: "password"

# 报告配置
report:
  # 报告输出路径
  output_dir: "./reports"
  # 报告格式（markdown, pdf）
  format: "markdown"
  # 是否包含 Grafana 截图
  include_screenshot: false
