global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Pushgateway（演练指标）
  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']

  # 如已有 k8s 集群的 cAdvisor，在此添加
  # - job_name: 'k8s-cadvisor'
  #   static_configs:
  #     - targets: ['<your-k8s-node>:10250']
