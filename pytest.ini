[pytest]
# Pytest 配置文件

# 测试文件匹配模式
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# 测试目录
testpaths = tests

# 输出选项
addopts =
    -v                          # 详细输出
    --strict-markers            # 严格标记模式
    --tb=short                  # 简短的回溯信息
    --cov=src                   # 代码覆盖率（覆盖 src 目录）
    --cov-report=html           # 生成 HTML 覆盖率报告
    --cov-report=term-missing   # 终端显示缺失的行
    --cov-fail-under=80         # 覆盖率低于 80% 时失败
    --maxfail=3                 # 最多失败 3 个测试后停止
    -ra                         # 显示所有测试结果摘要

# 标记定义
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试
    k8s: 需要 Kubernetes 集群的测试
    prometheus: 需要 Prometheus 的测试

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率配置
[coverage:run]
source = src
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
