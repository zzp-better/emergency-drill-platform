# GitHub Actions 工作流 - 自动化测试

name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - name: Checkout 代码
      uses: actions/checkout@v3

    - name: 设置 Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: 缓存依赖
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 代码格式检查
      run: |
        black --check .
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

    - name: 运行单元测试
      run: |
        pytest -m unit --cov=src --cov-report=xml --cov-report=term-missing

    - name: 运行集成测试
      run: |
        pytest -m integration --cov=src --cov-append --cov-report=xml --cov-report=term-missing

    - name: 上传覆盖率报告到 Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: 检查覆盖率阈值
      run: |
        pytest --cov=src --cov-fail-under=80 --cov-report=term-missing

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout 代码
      uses: actions/checkout@v3

    - name: 设置 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install pylint mypy black isort flake8

    - name: Pylint 检查
      run: |
        pylint src/ --exit-zero

    - name: MyPy 类型检查
      run: |
        mypy src/ --ignore-missing-imports --exit-zero

    - name: Import 排序检查
      run: |
        isort --check-only --profile black src/
