---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: edp-sa
  namespace: emergency-drill

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: edp-chaos-operator
rules:
  # Chaos Mesh 资源权限
  - apiGroups: ["chaos-mesh.org"]
    resources:
      - podchaos
      - networkchaos
      - stresschaos
      - iochaos
      - timechaos
      - kernelchaos
      - httpchaos
    verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]

  # Pod 查询权限（用于选择目标 Pod）
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]

  # Namespace 查询权限
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: edp-chaos-operator-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edp-chaos-operator
subjects:
  - kind: ServiceAccount
    name: edp-sa
    namespace: emergency-drill
